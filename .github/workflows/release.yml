name: Release

# Two paths:
#   - workflow_dispatch  -> dry run: build + publish to TestPyPI
#   - push of a v* tag   -> build + publish to PyPI + GitHub Release
#
# Publishing uses PyPI trusted publishing (OIDC) — no token secrets.
# Configure the trusted publisher on (test.)pypi.org for the "tts-daemon"
# project pointing at this repository, workflow "release.yml", and the
# matching environment name (testpypi / pypi).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version single-sourcing (and tag match on releases)
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            python3 scripts/check_version.py "$GITHUB_REF_NAME"
          else
            python3 scripts/check_version.py
          fi
      - name: Run the test suite
        run: |
          pip install -e '.[dev]'
          python3 -m pytest
      - name: Build sdist and wheel
        run: |
          pip install -U build twine packaging
          python3 -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    # Dry-run path: run the workflow manually to validate the pipeline
    # against TestPyPI before the first real tag.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tts-daemon
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tts-daemon
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    if: github.ref_type == 'tag'
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract release notes from CHANGELOG.md
        run: python3 scripts/release_notes.py "$GITHUB_REF_NAME" > release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
