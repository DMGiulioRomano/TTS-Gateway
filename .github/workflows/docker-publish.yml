name: Publish Docker image

# Publishes the multi-arch image to GHCR **only on version tags** (v*), which
# the maintainer creates deliberately. It never runs on a normal push or PR, so
# no image is built or pushed until a release is cut. GHCR auth uses the
# built-in GITHUB_TOKEN (packages: write) — no external secrets.
#
# A manual `workflow_dispatch` run is a **dry run**: it builds both arches but
# pushes nothing (and skips the GHCR login), so the Dockerfile and the
# multi-arch build can be validated before cutting a real tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx enable the linux/arm64 build (Raspberry Pi and friends)
      # alongside linux/amd64.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Skipped on the manual dry run — nothing is pushed, so no login needed.
      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dmgiulioromano/tts-daemon
          tags: |
            type=ref,event=tag                        # the git tag verbatim, e.g. v1.2.3
            type=semver,pattern={{version}}           # 1.2.3
            type=semver,pattern={{major}}.{{minor}}   # 1.2
            type=raw,value=latest
            type=raw,value=dry-run,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push on a tag; on the manual dry run, build only.
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
